name: Generate OG Image

on:
  push:
    paths:
      - 'og-image.svg'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Convert SVG to PNG (1200×630)
        run: rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png

      - name: Commit og-image.png
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add og-image.png
          git diff --cached --quiet || git commit -m "chore: auto-generate og-image.png from og-image.svg"
          git push
